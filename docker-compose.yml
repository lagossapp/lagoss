services:
  valkey:
    image: valkey/valkey:9.0.3
    command: valkey-server --save 20 1 --loglevel warning
    volumes:
      - valkey:/data
    ports:
      - 6379:6379
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.9.1
    ports:
      - 9090:9090
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus:/prometheus

  grafana:
    image: grafana/grafana:12.3.4
    ports:
      - 3001:3000
    volumes:
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana:/var/lib/grafana

  clickhouse:
    image: clickhouse/clickhouse-server:25.12.5-alpine
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - 8123:8123
      - 8000:9000
    environment:
      CLICKHOUSE_DB: serverless
      CLICKHOUSE_USER: lagoss
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse:/var/lib/clickhouse
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - 9002:9002
      - 9001:9001
    volumes:
      - minio:/data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-root}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-supersecret}
    entrypoint: sh
    command: -c 'mkdir -p /data/lagoss && minio server /data --console-address ":9001" --address ":9002"'

  bugsink:
    image: bugsink/bugsink:latest
    ports:
      - 8989:8000
    environment:
      SECRET_KEY: ${BUGSINK_SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: localhost
      SINGLE_USER: "${BUGSINK_EMAIL:-admin@example.com}:${BUGSINK_PASSWORD:-admin}"
    volumes:
      - bugsink:/var/lib/bugsink
    restart: unless-stopped

volumes:
  valkey:
  prometheus:
  grafana:
  clickhouse:
  minio:
  bugsink:
